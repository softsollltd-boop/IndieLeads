# Railway Configuration for IndieLeads Monorepo

[build]
builder = "dockerfile"
dockerfile = "Dockerfile"
context = "."

[deploy]
healthcheckPath = "/api/v1/health"
healthcheckTimeout = 100
restartPolicy = "always"

# Note: You can override the starting command in the Railway Dashboard 
# for different services (api vs workers) using the CMD override feature.
